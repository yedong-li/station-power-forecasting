name: Run Experiments

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-experiments:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt

    - name: Install system fonts (for Chinese rendering in plots)
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-wqy-zenhei

    - name: Summarize dataset protocol
      env:
        PYTHONPATH: .
      run: |
        python -u src/scripts/summarize_protocol.py

    - name: Run experiments
      env:
        PYTHONPATH: .
      run: |
        python -u src/scripts/run_experiments.py

    - name: Run classic baseline comparison
      env:
        PYTHONPATH: .
      run: |
        python -u src/scripts/run_baseline_comparison.py

    - name: Upload Experiment Report and Plots as Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: experiment-results
        path: |
          实验结果报告.md
          实验协议与数据统计补充.md
          经典算法对比实验.md
          src/results/

    - name: Commit and push generated report and plots
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update experiment results and report [skip ci]"
        file_pattern: '实验结果报告.md 实验协议与数据统计补充.md 经典算法对比实验.md src/results/*'
